name: Build and Test Fullstack App

# This tells GitHub to run this script every time someone pushes to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Check the Backend
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.11'

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          # If you write unit tests later, you would add 'pytest' here

  # Job 2: Check the Frontend & Build Docker Images
  frontend-and-docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      # This step verifies your Dockerfiles work perfectly without running them live
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false # Don't push to a public registry yet

      - name: Test Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false